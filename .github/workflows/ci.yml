name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: onsec
          POSTGRES_PASSWORD: onsec
          POSTGRES_DB: onsecboad
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U onsec -d onsecboad"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']

    env:
      DATABASE_URL: postgresql://onsec:onsec@localhost:5432/onsecboad?schema=public
      REDIS_URL: redis://localhost:6379
      APP_URL: http://localhost:3000
      PORTAL_URL: http://localhost:3000/portal
      API_URL: http://localhost:4000
      PUBLIC_DOMAIN: localhost
      JWT_ACCESS_SECRET: ci-access-ci-access-ci-access-ci-access-ci-access
      JWT_REFRESH_SECRET: ci-refresh-ci-refresh-ci-refresh-ci-refresh-ci
      ENCRYPTION_KEY_BASE64: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      WEBAUTHN_RP_ID: localhost
      WEBAUTHN_ORIGIN: http://localhost:3000

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile || pnpm install
      - run: pnpm db:generate
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - name: Prisma migrate diff (drift check)
        run: |
          cd packages/db
          npx prisma migrate diff --from-schema-datasource prisma/schema.prisma \
            --to-schema-datamodel prisma/schema.prisma --exit-code
      - run: pnpm build
